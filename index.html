<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha IA - Offline</title>
    <style>
        :root { 
            --bg: #0b141a; --header: #202c33; --bubble-in: #202c33; 
            --bubble-out: #005c4b; --text: #e9edef; --accent: #00a884; 
        }
        * { box-sizing: border-box; }
        body { 
            font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; height: 100vh; display: flex; flex-direction: column; 
        }
        header { 
            background: var(--header); padding: 12px 15px; display: flex; 
            justify-content: space-between; align-items: center; 
        }
        header h1 { font-size: 16px; margin: 0; }
        #status { font-size: 11px; color: #8696a0; margin: 3px 0 0; }
        #progress { height: 3px; background: #111b21; }
        #progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.2s; }
        #chat { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; 
            flex-direction: column; gap: 8px; scroll-behavior: smooth; 
        }
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 85%; line-height: 1.4; word-wrap: break-word; }
        .msg.in { background: var(--bubble-in); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.out { background: var(--bubble-out); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.thinking { font-style: italic; color: #8696a0; }
        #input-area { 
            background: var(--header); padding: 10px 15px; display: flex; gap: 8px; 
        }
        #msg-input { 
            flex: 1; padding: 12px; border-radius: 20px; border: none; 
            background: #2a3942; color: var(--text); font-size: 14px; outline: none; 
        }
        #send-btn { 
            padding: 12px 20px; border-radius: 20px; border: none; 
            background: var(--accent); color: #000; font-weight: 600; 
        }
        #send-btn:disabled { background: #37474f; color: #8696a0; }
        #model-select { 
            font-size: 11px; padding: 4px 8px; border-radius: 4px; 
            background: #111b21; color: var(--text); border: 1px solid #37474f; 
        }
    </style>
</head><body>

<header>
    <div>
        <h1>✨ Minha IA</h1>
        <p id="status">Carregando motor...</p>
    </div>
    <select id="model-select">
        <option value="TinyLlama-1.1B-Chat-v1.0-q4f16_1-MLC">TinyLlama 1.1B (leve)</option>
        <option value="Qwen2.5-1.5B-Instruct-q4f16_1-MLC">Qwen2.5 1.5B (equilíbrio)</option>
        <option value="Llama-3-8B-Instruct-q4f16_1-MLC" disabled>Llama-3 8B (pesado)</option>
    </select>
</header>

<div id="progress"><div id="progress-bar"></div></div>

<div id="chat">
    <div class="msg in">👋 Olá! Escolha um modelo leve e aguarde carregar.</div>
</div>

<div id="input-area">
    <input type="text" id="msg-input" placeholder="Digite sua mensagem..." disabled>
    <button id="send-btn" disabled>Enviar</button>
</div>

<script type="module">
    // === SUA INTERFACE, SEU CONTROLE ===
    const UI = {
        chat: document.getElementById('chat'),
        input: document.getElementById('msg-input'),
        btn: document.getElementById('send-btn'),
        progress: document.getElementById('progress-bar'),
        status: document.getElementById('status'),
        modelSelect: document.getElementById('model-select'),
        
        addMsg(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.textContent = text;
            this.chat.appendChild(div);
            this.chat.scrollTop = this.chat.scrollHeight;
            return div;
        },
        
        setLoading(loading) {
            this.input.disabled = loading;
            this.btn.disabled = loading;
            this.btn.textContent = loading ? '...' : 'Enviar';
        }
    };
    let engine = null;

    // === MOTOR DE TERCEIROS PLUGADO NA SUA INTERFACE ===
    async function loadEngine(modelId) {
        try {
            // Importa o WebLLM (terceiro) - só na primeira vez
            const { CreateWebWorkerEngine } = await import(
                'https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.46/+esm'
            );

            UI.status.textContent = 'Baixando modelo... (só na 1ª vez)';
            
            engine = await CreateWebWorkerEngine(
                new Worker(
                    new URL('https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.46/dist/worker.js', import.meta.url), 
                    { type: 'module' }
                ),
                modelId,
                {
                    initProgressCallback: (report) => {
                        UI.progress.style.width = `${report.progress * 100}%`;
                        UI.status.textContent = report.text;
                    }
                }
            );
            
            UI.status.textContent = '✅ Pronto! Pode conversar.';
            UI.addMsg('🤖 IA carregada! Estou pronta.', 'in');
            return true;
        } catch (err) {
            console.error(err);
            UI.status.textContent = '❌ Erro: ' + (err.message || 'Falha ao carregar');
            UI.addMsg('⚠️ Não foi possível carregar a IA. Tente um modelo mais leve ou verifique sua conexão.', 'in');
            return false;
        }
    }

    // === SUA LÓGICA DE CHAT ===
    async function sendMessage() {
        const text = UI.input.value.trim();
        if (!text || !engine) return;

        // Sua mensagem
        UI.addMsg(text, 'out');
        UI.input.value = '';
        UI.setLoading(true);

        // Indicador "pensando"
        const thinking = UI.addMsg('💭 Pensando...', 'in thinking');
        try {
            const response = await engine.chat.completions.create({
                messages: [{ role: 'user', content: text }],
                stream: false
            });
            
            const reply = response.choices[0].message.content;
            thinking.textContent = reply;
            thinking.classList.remove('thinking');
        } catch (err) {
            thinking.textContent = '❌ Erro ao gerar resposta. Tente novamente.';
            console.error(err);
        } finally {
            UI.setLoading(false);
        }
    }

    // === EVENTOS DA SUA INTERFACE ===
    UI.btn.onclick = sendMessage;
    UI.input.onkeypress = (e) => e.key === 'Enter' && sendMessage();
    
    UI.modelSelect.onchange = async () => {
        const model = UI.modelSelect.value;
        UI.chat.innerHTML = '';
        UI.addMsg(`🔄 Carregando ${model}...`, 'in');
        UI.progress.style.width = '0%';
        await loadEngine(model);
    };

    // === INICIALIZAÇÃO ===
    // Carrega o modelo leve por padrão
    window.addEventListener('load', async () => {
        await loadEngine('TinyLlama-1.1B-Chat-v1.0-q4f16_1-MLC');
    });
</script>

</body>
</html>
